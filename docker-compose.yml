# ============================================================
# ASTERION ONE — Docker Compose (Infrastructure)
# ============================================================
# Phase 0: PostgreSQL
# Phase 3: + init script for test database
# Phase 5: + OTel stack (separate compose file)
# ============================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: asterion-postgres
    environment:
      POSTGRES_USER: asterion
      POSTGRES_PASSWORD: asterion_dev
      POSTGRES_DB: asterion
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ground/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterion"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: